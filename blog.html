<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Blog Writer - QuickAI</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.svg">

</head>

<body>

<header>

<nav class="navbar">

<div class="logo" id="logo">
⚡ QuickAI
</div>

<div class="nav-links">

<a href="index.html">Home</a>

<a href="about.html">About</a>

<a href="contact.html">Contact</a>

</div>

<div class="top-buttons">

<button id="themeBtn">🌙</button>

<button id="langBtn">العربية</button>

</div>

</nav>

<section class="hero">

<h1 id="pageTitle">
AI Blog Writer
</h1>

<p id="pageDesc">
Generate blog posts using AI.
</p>

</section>

</header>

<main>

<div class="card">

<textarea id="blogInput" placeholder="Write your blog topic..."></textarea>

<button id="generateBlogBtn">
Generate Blog
</button>

<h2 id="resultTitle">
Result
</h2>

<p id="result">
Your blog will appear here.
</p>

</div>

</main>

  <footer>

<p>
<a href="about.html">About</a> |
<a href="contact.html">Contact</a>
</p>

<p>© 2026 QuickAI - AI Tools Platform</p>

</footer>

<script src="languages.js"></script>
<script src="script.js"></script>

<script>

const generateBlogBtn = document.getElementById("generateBlogBtn");

generateBlogBtn.onclick = function(){

const input = document.getElementById("blogInput").value.trim();

if(input === ""){

document.getElementById("result").innerText =
"Please enter a blog topic.";

return;

}

document.getElementById("result").innerText =
"This feature will be connected to AI soon.\n\nBlog topic:\n" + input;

};

</script>

</body>
</html>
