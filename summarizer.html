<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Text Summarizer - QuickAI</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<button id="langBtn">العربية</button>

<div class="logo">
⚡ QuickAI
</div>

<h1 id="pageTitle">
AI Text Summarizer
</h1>

</main>




<footer>

<p>
© 2026 QuickAI - AI Tools Platform
</p>

</footer>



<script src="summarizer.js"></script>
